<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交流会ゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- タブナビゲーション -->
  <header>
    <nav class="tab-nav" role="tablist" aria-label="ゲーム選択">
      <button class="tab-btn active"
              role="tab"
              aria-selected="true"
              aria-controls="panel-english"
              data-tab="english">
        英語限定説明
      </button>
      <button class="tab-btn"
              role="tab"
              aria-selected="false"
              aria-controls="panel-turtle"
              data-tab="turtle">
        ウミガメのスープ
      </button>
      <button class="tab-btn"
              role="tab"
              aria-selected="false"
              aria-controls="panel-wordwolf"
              data-tab="wordwolf">
        ワードウルフ
      </button>
    </nav>
  </header>

  <!-- メインコンテンツ -->
  <main class="main-content">

    <!-- データソースバッジ（JSが挿入） -->
    <div id="data-source-badge-container"></div>

    <!-- ===== ゲームA: 英語限定説明 ===== -->
    <section id="panel-english"
             class="game-panel active"
             role="tabpanel"
             aria-labelledby="tab-english">

      <h2>英語限定説明ゲーム</h2>
      <p class="game-description">
        NGワードを使わずに、英語でお題を説明しよう！
      </p>

      <!-- カードフリップエリア -->
      <div class="card-scene" aria-live="polite">
        <div class="card" id="english-card">
          <div class="card-face card-front">
            <span class="card-front-icon">🃏</span>
            <span>ボタンを押してお題を引く</span>
          </div>
          <div class="card-face card-back">
            <span class="topic-label">お題</span>
            <span class="topic-value" id="english-topic"></span>
            <span class="ngwords-label" style="margin-top:8px;">NGワード</span>
            <span class="ngwords-value" id="english-ngwords"></span>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-draw-english">
        お題を引く
      </button>
      <p class="status-message" id="english-status" role="status"></p>
    </section>

    <!-- ===== ゲームB: ウミガメのスープ ===== -->
    <section id="panel-turtle"
             class="game-panel"
             role="tabpanel"
             aria-labelledby="tab-turtle"
             hidden>

      <h2>ウミガメのスープ</h2>
      <p class="game-description">
        出題者だけが真相を知っている、横解きミステリー。
      </p>

      <!-- 問題文エリア（常時表示） -->
      <div class="question-display is-empty"
           id="turtle-question-display"
           aria-live="polite">
        「問題を引く」を押すと、ここに問題文が表示されます。
      </div>

      <!-- 真相フェードイン展開エリア（初期非表示） -->
      <div class="turtle-answer-wrapper"
           id="turtle-answer-wrapper"
           aria-live="polite"
           aria-hidden="true">
        <div class="turtle-answer-inner">
          <div class="turtle-answer-inner-content">
            <span class="answer-label">真相</span>
            <p class="answer-value" id="turtle-answer"></p>
          </div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="btn-draw-turtle">
          問題を引く
        </button>
        <button class="btn btn-secondary" id="btn-reveal-turtle" disabled>
          出題者として答えを見る
        </button>
      </div>
      <p class="status-message" id="turtle-status" role="status"></p>
    </section>

    <!-- ===== ゲームC: ワードウルフ ===== -->
    <section id="panel-wordwolf"
             class="game-panel"
             role="tabpanel"
             aria-labelledby="tab-wordwolf"
             hidden>

      <h2>ワードウルフ</h2>
      <p class="game-description">
        全員が同じ「合言葉＋回戦数」を入力すると、サーバーなしで役割が同期されます。
      </p>

      <!-- 入力フォーム -->
      <div class="wordwolf-form">
        <div class="form-group">
          <label for="ww-keyword">合言葉（全員共通）</label>
          <input type="text"
                 id="ww-keyword"
                 placeholder="例: こんにゃく"
                 autocomplete="off"
                 spellcheck="false">
        </div>
        <div class="form-group">
          <label for="ww-round">回戦数</label>
          <input type="number"
                 id="ww-round"
                 min="1"
                 max="99"
                 value="1">
        </div>
        <div class="form-group">
          <label for="ww-mynum">自分のプレイヤー番号</label>
          <input type="number"
                 id="ww-mynum"
                 min="1"
                 value="1">
        </div>
        <div class="form-group">
          <label for="ww-total">総人数</label>
          <input type="number"
                 id="ww-total"
                 min="2"
                 max="20"
                 value="4">
        </div>
      </div>

      <!-- 役割フリップカード -->
      <div class="card-scene" aria-live="polite">
        <div class="card" id="wordwolf-card">
          <div class="card-face card-front">
            <span class="card-front-icon">🐺</span>
            <span>「役割を確認する」を押す</span>
          </div>
          <div class="card-face card-back">
            <span class="role-badge" id="ww-role-badge"></span>
            <span class="ww-topic-label" style="margin-top:8px;">あなたのお題</span>
            <span class="ww-topic-value" id="ww-topic"></span>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-check-wordwolf">
        役割を確認する
      </button>
      <p class="status-message" id="wordwolf-status" role="status"></p>
    </section>

  </main>

  <!-- 確認モーダル（共通） -->
  <div class="modal-overlay"
       id="modal-overlay"
       role="dialog"
       aria-modal="true"
       aria-labelledby="modal-message"
       aria-hidden="true">
    <div class="modal-box">
      <p class="modal-message" id="modal-message"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">キャンセル</button>
        <button class="btn btn-danger" id="modal-confirm">確認・表示する</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
